<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlobalTicket Pro - International Booking System</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f4f6f9; margin: 0; padding: 10px; color: #333; }
        .container { background: #ffffff; max-width: 460px; margin: 15px auto; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); border-top: 6px solid #111111; }
        h2 { font-size: 22px; margin: 0 0 5px 0; text-align: center; color: #111; font-weight: 700; letter-spacing: -0.5px; }
        .lang-selector { text-align: right; margin-bottom: 15px; }
        .lang-btn { background: none; border: 1px solid #ccc; padding: 4px 8px; font-size: 11px; border-radius: 4px; cursor: pointer; margin-left: 5px; font-weight: bold; }
        .lang-btn.active { background-color: #111; color: white; border-color: #111; }
        .urgency-badge { background-color: #dc3545; color: white; padding: 6px 12px; font-size: 11px; font-weight: bold; border-radius: 20px; display: inline-block; margin-bottom: 20px; }
        .form-group { margin-bottom: 16px; text-align: left; }
        label { display: block; font-size: 11px; font-weight: bold; margin-bottom: 5px; color: #555; text-transform: uppercase; letter-spacing: 0.5px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 14px; background: #fafafa; }
        .price-breakdown { background: #f8f9fa; border: 1px solid #e9ecef; border-radius: 6px; padding: 12px; margin-top: 15px; font-size: 12px; display: none; }
        .price-row { display: flex; justify-content: space-between; margin-bottom: 6px; }
        .price-total { border-top: 1px solid #ddd; padding-top: 6px; font-weight: bold; color: #111; font-size: 14px; }
        .btn-submit { background-color: #111; color: white; border: none; padding: 15px; width: 100%; font-size: 15px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 15px; }
        .success-icon { color: #28a745; font-size: 56px; margin-bottom: 15px; text-align: center; }
    </style>
</head>
<body>

    <!-- SELECTOR DE IDIOMA INICIAL -->
    <div class="container" id="lang-screen" style="text-align: center; padding: 40px 20px;">
        <h2 style="margin-bottom: 10px;">Welcome / Bienvenido</h2>
        <p style="font-size: 14px; color: #666; margin-bottom: 30px;">Select your preferred language to continue with the allocation system.<br>Seleccione su idioma preferido para continuar.</p>
        <button class="btn-submit" onclick="setLanguage('es')" style="margin-bottom: 10px;">Español (América Latina)</button>
        <button class="btn-submit" onclick="setLanguage('en')" style="background-color: #fff; color: #111; border: 2px solid #111;">English (Global)</button>
    </div>

    <!-- PANTALLA PRINCIPAL DEL FORMULARIO (OCULTA AL INICIO) -->
    <div class="container" id="form-container" style="display: none;">
        <div class="lang-selector">
            <button id="btn-lang-es" class="lang-btn" onclick="setLanguage('es')">ES</button>
            <button id="btn-lang-en" class="lang-btn" onclick="setLanguage('en')">EN</button>
        </div>
        
        <h2 id="txt-title">GlobalTicket Pro</h2>
        <p id="txt-subtitle" style="font-size: 13px; text-align: center; color: #666; margin: 0 0 15px 0;"></p>
        
        <div style="text-align: center;">
            <div class="urgency-badge" id="txt-badge"></div>
        </div>
        
        <form onsubmit="procesarSimulacion(event)">
            <div class="form-group">
                <label id="lbl-evento"></label>
                <select required id="evento" onchange="actualizarPrecio()">
                    <option value="" id="opt-default">-- --</option>
                    <!-- Las opciones se cargan dinámicamente por JavaScript según el idioma -->
                </select>
            </div>

            <!-- DESGLOSE DE COSTOS COMPLETO -->
            <div class="price-breakdown" id="breakdown-box">
                <div class="price-row"><span id="lbl-break-base"></span><span id="val-base">$0.00 MXN</span></div>
                <div class="price-row"><span id="lbl-break-tax"></span><span id="val-tax">$0.00 MXN</span></div>
                <div class="price-row"><span id="lbl-break-service"></span><span id="val-service">$0.00 MXN</span></div>
                <div class="price-row price-total"><span id="lbl-break-total"></span><span id="val-total">$0.00 MXN</span></div>
            </div>

            <div class="form-group" style="margin-top: 15px;">
                <label id="lbl-tarjeta"></label>
                <input type="text" placeholder="4242 4242 4242 4242" inputmode="numeric" maxlength="19" required>
            </div>

            <div class="form-group" style="display: flex; gap: 10px;">
                <div style="flex: 1;">
                    <label id="lbl-exp"></label>
                    <input type="text" placeholder="MM/AA" maxlength="5" required>
                </div>
                <div style="flex: 1;">
                    <label id="lbl-cvv"></label>
                    <input type="password" placeholder="•••" inputmode="numeric" maxlength="3" required>
                </div>
            </div>

            <button type="submit" class="btn-submit" id="btn-text"></button>
        </form>
    </div>

    <!-- PANTALLA DE ÉXITO FICTICIO -->
    <div class="container" id="success-container" style="display: none; text-align: center;">
        <div class="success-icon">✓</div>
        <h2 id="txt-success-title"></h2>
        <p id="txt-success-p1" style="font-size: 14px; color: #444; margin-top: 15px; line-height: 1.5;"></p>
        <p style="font-size: 13px; color: #666; background: #f8f9fa; padding: 10px; border-radius: 6px; border: 1px solid #eee;">
            <span id="lbl-loc"></span>: <strong>GT-982XW</strong>
        </p>
        <p id="txt-success-p2" style="font-size: 12px; color: #999; margin-top: 25px;"></p>
    </div>
